receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  # Pin HTTP semantic-convention naming so the Prom exporter does not switch
  # metric names between OTel SDK versions (Codex finding #7).
  resource:
    attributes:
      - key: service.namespace
        value: fastscanner
        action: upsert

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: ""
    send_timestamps: false
    metric_expiration: 5m
    enable_open_metrics: false
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus]

  telemetry:
    logs:
      level: info
