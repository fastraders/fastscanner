global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: fastscanner

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  # OTel Collector exposes a Prometheus exporter at :8889 with metrics
  # aggregated from writer + caching + 99 FastAPI workers (all push via OTLP).
  - job_name: otel-collector
    static_configs:
      - targets: ['127.0.0.1:8889']

  - job_name: nats-exporter
    static_configs:
      - targets: ['127.0.0.1:7777']

  - job_name: node
    static_configs:
      - targets: ['127.0.0.1:9100']
