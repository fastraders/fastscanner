global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: fastscanner

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: writer
    static_configs:
      - targets: ['127.0.0.1:9101']
        labels:
          process: run_realtime_writer

  - job_name: caching
    static_configs:
      - targets: ['127.0.0.1:9102']
        labels:
          process: run_indicators_caching

  - job_name: rest
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:12356']
        labels:
          process: rest_api

  - job_name: nats-exporter
    static_configs:
      - targets: ['127.0.0.1:7777']

  - job_name: node
    static_configs:
      - targets: ['127.0.0.1:9100']
