# Drop-in override for the otelcol-contrib.service systemd unit installed by
# the otelcol-contrib_<version>_linux_amd64.deb package.
#
# Install on the host:
#   sudo mkdir -p /etc/systemd/system/otelcol-contrib.service.d
#   sudo cp otelcol-contrib-override.conf \
#     /etc/systemd/system/otelcol-contrib.service.d/override.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart otelcol-contrib
#
# Verify:
#   systemctl status otelcol-contrib
#   curl localhost:8889/metrics | head

[Service]
ExecStart=
ExecStart=/usr/bin/otelcol-contrib --config=/home/mmoheeka/Projects/fastscanner/deploy/observability/otel-collector.yaml
